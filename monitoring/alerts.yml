groups:
  - name: irrigai

    rules:
      # ── Stale probe data ────────────────────────────────────────────────────
      # Fires when no new probe reading has been ingested for 3 hours.
      # Requires that the data ingestion job increments irrigai_scheduler_job_runs_total
      # at least once per interval. A missing label means the job has never run.
      - alert: ProbeDataStale
        expr: |
          (time() - irrigai_scheduler_job_runs_total{job="data_ingestion", status="success"}) > 10800
          or absent(irrigai_scheduler_job_runs_total{job="data_ingestion", status="success"})
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Probe data ingestion has not succeeded in 3h"
          description: "The data_ingestion scheduler job has not recorded a success for over 3 hours."

      # ── Failed scheduler jobs ───────────────────────────────────────────────
      - alert: SchedulerJobFailing
        expr: |
          increase(irrigai_scheduler_job_runs_total{status="failure"}[30m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler job {{ $labels.job }} is failing"
          description: "Job {{ $labels.job }} recorded at least one failure in the last 30 minutes."

      # ── Elevated 5xx rate ───────────────────────────────────────────────────
      - alert: High5xxRate
        expr: |
          sum(rate(irrigai_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(irrigai_http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate above 5%"
          description: "More than 5% of HTTP responses are 5xx errors (current: {{ $value | humanizePercentage }})."

      # ── High request latency ────────────────────────────────────────────────
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(irrigai_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 request latency above 3 s"
          description: "The 95th-percentile response time is {{ $value | humanizeDuration }}."

      # ── AI / LLM failures ──────────────────────────────────────────────────
      - alert: LLMFailureRate
        expr: |
          increase(irrigai_ai_requests_total{status="failure"}[15m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "LLM API calls are failing"
          description: "More than 3 LLM call failures in the last 15 minutes (model={{ $labels.model }})."

      # ── Recommendation engine failures ─────────────────────────────────────
      - alert: RecommendationEngineFailing
        expr: |
          increase(irrigai_recommendations_generated_total{status="failure"}[30m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Recommendation engine is producing failures"
          description: "More than 5 recommendation failures in the last 30 minutes."

      # ── Flowmeter device ingestion failures ─────────────────────────────────
      # The signature of the recurring MyIrrigation 406 "Client Signature Invalid"
      # credential outage: per-device data POSTs fail every run. The job itself
      # does not crash (the failure is per-device), so SchedulerJobFailing alone
      # missed it for days — this watches the per-device outcome counter directly.
      # ~49 devices × 3 runs/h ⇒ a full outage produces ~147 failures/h; the >10
      # threshold catches a full or large-partial outage while tolerating the odd
      # one-off device error.
      - alert: FlowmeterDeviceIngestionFailing
        expr: |
          increase(irrigai_flowmeter_device_ingestion_total{result="failure"}[1h]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Flowmeter device ingestion is failing"
          description: "More than 10 per-device flowmeter ingestion failures in the last hour — likely a MyIrrigation 406 credential/signature outage. Check `set_farm_credentials.py` (VERIFY=1)."
