# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Replace YOUR_DOMAIN in nginx/prod.conf
#   2. Set all secrets in .env (strong SECRET_KEY, real passwords)
#   3. Run certbot once to get the initial certificate:
#      docker compose run --rm certbot certonly --webroot \
#        --webroot-path /var/www/certbot \
#        --email you@example.com --agree-tos --no-eff-email \
#        -d YOUR_DOMAIN

services:
  backend:
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
    # No direct port exposure — all traffic goes through nginx
    ports: []

  frontend:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://YOUR_DOMAIN/api/v1
    ports: []

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certs automatically — run via cron or manually
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot_www:
  certbot_certs:
