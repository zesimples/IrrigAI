# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Replace YOUR_DOMAIN in nginx/prod.conf
#   2. Set all secrets in .env (strong SECRET_KEY, real passwords)
#   3. Run certbot once to get the initial certificate:
#      docker compose run --rm certbot certonly --webroot \
#        --webroot-path /var/www/certbot \
#        --email you@example.com --agree-tos --no-eff-email \
#        -d YOUR_DOMAIN

services:
  db:
    # Compose merges unique port entries across files.  An ordinary `ports: []`
    # does not remove the development publication, so explicitly reset it.
    ports: !reset []

  redis:
    ports: !reset []

  backend:
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      # The backend has no direct port exposure in prod (see below) — the only
      # peer that can ever connect is the reverse proxy on the same host
      # (nginx here, or systemd Caddy via the loopback-only publication in the
      # production-local docker-compose.caddy.yml). That connection is NATed
      # through Docker's bridge network, so uvicorn's immediate TCP peer is
      # the docker gateway, never the real client or 127.0.0.1 — uvicorn's
      # default `forwarded_allow_ips=127.0.0.1` therefore never trusts
      # X-Forwarded-For, and every request (including rate-limited ones like
      # /auth/token) collapses onto one shared IP bucket. Trusting all peers
      # here is safe precisely because nothing else can reach this port.
      FORWARDED_ALLOW_IPS: "*"
    # No direct port exposure — all traffic goes through nginx
    ports: !reset []

  frontend:
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:8000
    ports: !reset []

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certs automatically — run via cron or manually
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot_www:
  certbot_certs:
