services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-irrigai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irrigai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-irrigai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irrigai} -d ${POSTGRES_DB:-irrigai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Internal URL used by Next.js server-side proxy — never reaches the browser
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
