services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-irrigai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irrigai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-irrigai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irrigai} -d ${POSTGRES_DB:-irrigai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Dedicated scheduler worker — the only process that runs APScheduler.
  # Single replica enforces exactly-one execution; Redis job locks protect
  # against concurrent runs during restarts.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-irrigai}:${POSTGRES_PASSWORD:-irrigai_dev}@db:5432/${POSTGRES_DB:-irrigai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Internal URL used by Next.js server-side proxy — never reaches the browser
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db-backup:
    image: timescale/timescaledb:latest-pg16
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-irrigai}
      PGPASSWORD: ${POSTGRES_PASSWORD:-irrigai_dev}
      PGDATABASE: ${POSTGRES_DB:-irrigai}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c '
        mkdir -p /backups &&
        while true; do
          FILENAME="/backups/irrigai_$$(date +%Y%m%d_%H%M%S).sql.gz" &&
          pg_dump | gzip > "$$FILENAME" &&
          echo "Backup written: $$FILENAME" &&

          echo "Verifying backup: $$FILENAME" &&
          VERIFY_DB="irrigai_verify_$$(date +%s)" &&
          createdb "$$VERIFY_DB" &&
          if gunzip -c "$$FILENAME" | psql -q "$$VERIFY_DB" > /dev/null 2>&1; then
            FARM_COUNT=$$(psql -t -A -c "SELECT COUNT(*) FROM farm;" "$$VERIFY_DB" 2>/dev/null || echo "err") &&
            echo "Backup verify OK: farm_count=$$FARM_COUNT file=$$FILENAME" ;
          else
            echo "ERROR: Backup restore FAILED for $$FILENAME" ;
          fi &&
          dropdb --if-exists "$$VERIFY_DB" &&

          find /backups -name "irrigai_*.sql.gz" -mtime +7 -delete &&
          sleep 86400 ;
        done
      '

volumes:
  postgres_data:
  redis_data:
