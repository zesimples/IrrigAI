name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: irrigai
          POSTGRES_PASSWORD: irrigai_test
          POSTGRES_DB: irrigai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U irrigai -d irrigai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://irrigai:irrigai_test@localhost:5432/irrigai_test
      DATABASE_URL_SYNC: postgresql://irrigai:irrigai_test@localhost:5432/irrigai_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-not-for-production
      ENCRYPTION_KEY: ci-encryption-key-not-for-production
      LLM_PROVIDER: mock
      PROBE_PROVIDER: mock
      WEATHER_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest -x -q --tb=short

  # ── Migration integrity ──────────────────────────────────────────────────────
  migration-check:
    name: Migration integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: irrigai
          POSTGRES_PASSWORD: irrigai_test
          POSTGRES_DB: irrigai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U irrigai -d irrigai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://irrigai:irrigai_test@localhost:5432/irrigai_test
      DATABASE_URL_SYNC: postgresql://irrigai:irrigai_test@localhost:5432/irrigai_test
      SECRET_KEY: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e .
      - name: Apply all migrations
        run: alembic upgrade head
      - name: Verify no pending model changes
        run: alembic check

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:run

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      BACKEND_INTERNAL_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-build-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── E2E ──────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: irrigai
          POSTGRES_PASSWORD: irrigai_test
          POSTGRES_DB: irrigai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U irrigai -d irrigai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://irrigai:irrigai_test@localhost:5432/irrigai_test
      DATABASE_URL_SYNC: postgresql://irrigai:irrigai_test@localhost:5432/irrigai_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-not-for-production
      ENCRYPTION_KEY: ci-encryption-key-not-for-production
      LLM_PROVIDER: mock
      PROBE_PROVIDER: mock
      WEATHER_PROVIDER: mock
      BACKEND_INTERNAL_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-build-secret
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -e .

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: npm start -- -p 3000 &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8000/health http://localhost:3000 --timeout 60000

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
